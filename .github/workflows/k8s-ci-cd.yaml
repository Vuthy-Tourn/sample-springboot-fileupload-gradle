name: CI/CD Pipeline - Build, Push & Update Helm

on:
  push:
    tags:
      - "v*.*.*"   # Triggers on semantic version tags like v1.0.0, v0.1.3, etc.

env:
  IMAGE_NAME: spring-fileupload-itp
  HELM_REPO: vuthytourn/argocd-gitops-itp.git

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: DOCKER_ENV
    outputs:
      image_tag: ${{ steps.extract_tag.outputs.tag }}   # Pass tag to next job cleanly

    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # Updated to v4

      - name: Extract tag from ref
        id: extract_tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"   # Strips 'refs/tags/' → gives 'v1.0.0'
          echo "tag=$TAG" >> $GITHUB_OUTPUT   # Expose to other jobs via outputs

      - name: Show tag value
        run: echo "Building image with tag → ${{ steps.extract_tag.outputs.tag }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3   # Enables advanced build features & caching

      - name: Login to DockerHub
        uses: docker/login-action@v3   # Safer than raw CLI login
        with:
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dev.Dockerfile
          push: true
          tags: |
            ${{ secrets.USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.extract_tag.outputs.tag }}
            ${{ secrets.USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha   # GitHub Actions cache for faster builds
          cache-to: type=gha,mode=max

  update-helm-repo:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: DOCKER_ENV
    
    steps:
      - name: Install yq
        run: |
          wget -q https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Checkout Helm repository
        run: |
          git clone https://x-access-token:${{ secrets.GIT_TOKEN }}@github.com/${{ env.HELM_REPO }} helm-repo   # x-access-token is the correct format for PAT auth

      - name: Update Helm values.yaml
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}  # ← pull from build-and-push
        run: |
          cd helm-repo
          yq -i ".image.repository=\"${{ secrets.USERNAME }}/${{ env.IMAGE_NAME }}\"" springboot-chart/values-prod.yaml
          yq -i ".image.tag=\"${{ IMAGE_TAG }}\"" springboot-chart/values-prod.yaml

          git config --global user.email "ci-bot@github-actions.local"
          git config --global user.name "GitHub Actions Bot"
          git add springboot-chart/values-prod.yaml   # Stage only the file you changed, not everything
          git diff --cached --quiet || git commit -m "ci: update ${{ env.IMAGE_NAME }} image tag to ${{ IMAGE_TAG }}"   # Skip commit if no changes
          git push https://x-access-token:${{ secrets.GIT_TOKEN }}@github.com/${{ env.HELM_REPO }}

      - name: Clean up cloned repo
        if: always()
        run: rm -rf helm-repo